name: Test and Lint Vue frontend
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "22.x" # set this to the node version to use

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Run tests
        run: pnpm test:run
        env:
          CI: true

      - name: Lint
        run: pnpm lint:check
        env:
          CI: true

      - name: Build
        run: pnpm build
        env:
          CI: true

      # disable typecheck for now
      # - name: Typecheck
      #   run: pnpm typecheck
      #   env:
      #     CI: true
